services:
  - type: web
    name: lead-agent-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE_HOURS
        value: "8"
      - key: OPENAI_API_KEY
        sync: false
      
      - key: SCHEDULER_TIMEZONE
        value: UTC
